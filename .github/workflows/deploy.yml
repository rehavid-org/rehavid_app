# ===========================================================================
# CD: Deploy to single Azure VM via SSH + rsync
# ===========================================================================
# Pivot 2026-07-17: abandoned ACR + App Service; now deploys to a single
# Azure VM (20.119.43.198) by rsyncing the repo and running
# scripts/deploy-vm.sh over SSH.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   VM_SSH_KEY  — private SSH key contents for azureuser (from ~/.ssh/rehavid-vm-key)
#   VM_HOST     — VM public IP (20.119.43.198)
#   VM_USER     — SSH user (azureuser)
#
# .envs/.production/ on the VM is managed out-of-band and is NEVER
# overwritten by this workflow (rsync excludes + filter protect).
#
# Manual rollback:
#   ssh azureuser@<VM_HOST>
#   cd /opt/rehavid/app
#   git checkout <previous-tag>   # or rsync a previous release
#   bash scripts/deploy-vm.sh
#   CAVEAT: if the failed deploy applied a new migration, you may need
#   `python manage.py migrate <app> <previous_migration>` before rolling
#   back — Django migrations are not auto-reversed.
# ===========================================================================

name: Deploy

on:
  push:
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rehavid
          POSTGRES_PASSWORD: rehavid
          POSTGRES_DB: rehavid_app
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://rehavid:rehavid@localhost:5432/rehavid_app
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: 'true'
      - uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'
      - run: uv sync --locked
      - run: uv run python manage.py makemigrations --check
      - run: uv run pytest

  deploy-to-vm:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      VM_DIR: /opt/rehavid/app
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install SSH client
        run: sudo apt-get update -qq && sudo apt-get install -y -qq openssh-client rsync

      - name: Configure SSH key
        env:
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_HOST: ${{ secrets.VM_HOST }}
        run: |
          mkdir -p ~/.ssh
          # printf evita que un trailing newline o escape corrompan la key
          printf '%s\n' "$VM_SSH_KEY" > ~/.ssh/vm_key
          chmod 600 ~/.ssh/vm_key
          # ssh-keyscan best-effort: StrictHostKeyChecking=accept-new en el
          # ssh real se encarga de agregar el host al known_hosts si faltara.
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      # -------------------------------------------------------------------
      # rsync exclude notes:
      #   - Trailing slash on directory excludes means "directory named X"
      #     (not a file named X). This is standard rsync behavior.
      #   - --exclude='.envs/.production/' prevents rsync from transferring
      #     the directory, and --filter='protect .envs/.production/' is
      #     belt-and-suspenders: even if --delete-after would normally
      #     remove files absent from the sender, 'protect' tells rsync to
      #     never delete matching paths on the receiver.
      #   - .git/ is excluded because the VM doesn't need repo history;
      #     deploy-vm.sh doesn't use git.
      # -------------------------------------------------------------------
      - name: Rsync code to VM
        env:
          VM_USER: ${{ secrets.VM_USER }}
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_DIR: /opt/rehavid/app
        run: |
          rsync -avz --delete-after \
            --exclude='.git/' \
            --exclude='.venv/' \
            --exclude='node_modules/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache/' \
            --exclude='.atl/' \
            --exclude='.gga/' \
            --exclude='.envs/.production/' \
            --filter='protect .envs/.production/' \
            -e "ssh -i ~/.ssh/vm_key -o StrictHostKeyChecking=accept-new" \
            ./ \
            "${VM_USER}@${VM_HOST}:${VM_DIR}/"

      - name: Ensure deploy script is executable
        env:
          VM_USER: ${{ secrets.VM_USER }}
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_DIR: /opt/rehavid/app
        run: |
          ssh -i ~/.ssh/vm_key -o StrictHostKeyChecking=accept-new \
            "${VM_USER}@${VM_HOST}" "chmod +x ${VM_DIR}/scripts/deploy-vm.sh"

      - name: Run deploy script on VM
        timeout-minutes: 20
        env:
          VM_USER: ${{ secrets.VM_USER }}
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_DIR: /opt/rehavid/app
        run: |
          ssh -i ~/.ssh/vm_key -o StrictHostKeyChecking=accept-new \
            "${VM_USER}@${VM_HOST}" "cd ${VM_DIR} && bash scripts/deploy-vm.sh"

      - name: External health check
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
        run: |
          echo "Verifying health at http://${VM_HOST}/health/ ..."
          for i in $(seq 1 6); do
            if curl -fsS --max-time 30 "http://${VM_HOST}/health/"; then
              echo ""
              echo "Health check PASSED"
              echo "Deployed SHA: ${{ github.sha }}"
              exit 0
            fi
            echo "Attempt $i failed — retrying in 10s..."
            sleep 10
          done
          echo "Health check FAILED after 6 attempts"
          exit 1
